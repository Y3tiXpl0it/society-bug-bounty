services:
    db:
        image: postgres:16-alpine
        container_name: postgres_db
        restart: always
        env_file:
            - .env
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test:
                ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: redis_broker
        restart: always
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
        command: redis-server --appendonly yes

    backend:
        build:
            context: ./backend
        container_name: fastapi_backend
        restart: always
        ports:
            - "8000:8000"
        volumes:
            - ./backend:/app
            - /app/.venv
            # Persist uploaded media files during development
            - ./backend/media:/app/media
        env_file:
            - .env
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        # Run database migrations and start Uvicorn with hot-reload
        # Binding to 0.0.0.0 is required to expose the port outside the container
        command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

    celery_worker:
        build:
            context: ./backend
        container_name: celery_worker
        restart: always
        # Enable --reload to automatically detect code changes in tasks
        command: uv run celery -A app.celery_worker worker --beat --loglevel=info --pool=solo --concurrency=1 --hostname=celery_worker
        volumes:
            - ./backend:/app
            - /app/.venv
            # Worker needs access to media files for processing
            - ./backend/media:/app/media
        env_file:
            - .env
        depends_on:
            redis:
                condition: service_healthy
            db:
                condition: service_healthy

    flower:
        build:
            context: ./backend
        container_name: celery_flower
        restart: always
        # Run Flower monitoring tool with a specific URL prefix
        command: uv run celery -A app.celery_worker flower --port=5555 --url_prefix=flower
        ports:
            - "5555:5555"
        volumes:
            - ./backend:/app
            - /app/.venv
            - ./backend/media:/app/media
        env_file:
            - .env
        depends_on:
            - redis
            - celery_worker

    frontend:
        build:
            context: ./frontend
            # Target the 'builder' stage (Node environment) instead of the final production stage
            target: builder
        container_name: react_frontend
        restart: always
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/app
            - /app/node_modules
        env_file:
            - .env
        # Run Vite in development mode
        # --host is necessary to make the server accessible from outside the container
        command: pnpm run dev --host

volumes:
    postgres_data:
    redis_data:
