{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h3 style="color: #333;">{{ title }}</h3>
<p>{{ message }}</p>

{% if action_url %}
<div style="text-align: center; margin-top: 20px;">
    <a href="{{ action_url }}"
        style="background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">View
        Details</a>
</div>
{% endif %}
{% endblock %}
